apiVersion: v1
kind: Pod
metadata:
  name: rabbit-mq
  namespace: prioriza
  labels:
    app: prioriza
    kind: mq
spec:
  containers:
    - name: rabbit-mq
      image: rabbitmq:4.2.4-alpine
      ports:
        - name: http
          containerPort: 5672
      env:
        - name: RABBIT_HOST
          valueFrom:
            configMapKeyRef:
              name: back-configuration
              key: RABBIT_HOST
        - name: RABBIT_PORT
          valueFrom:
            configMapKeyRef:
              name: back-configuration
              key: RABBIT_PORT
      livenessProbe:
        exec:
          command:
            - sh
            - -c
            - rabbitmq-diagnostics -q ping
        periodSeconds: 5
        failureThreshold: 3
        timeoutSeconds: 2
